
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; height: auto; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#3C3489',
    primaryBorderColor: dark ? '#7F77DD' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    tertiaryColor: dark ? '#633806' : '#FAEEDA',
  },
});

const diagram = `erDiagram
  USER {
    string uid PK
    string email
    string displayName
    string photoURL
    string name
    string bio
    string major
    string classYear
    string[] committees
    number points
    number pointsThisMonth
    number pointsRank
    string rankChange
    boolean isStudent
    boolean resumeVerified
    string[] interests
    Timestamp nationalExpiration
    Timestamp chapterExpiration
  }

  ROLES {
    string uid FK
    boolean reader
    boolean officer
    boolean admin
    boolean developer
    boolean representative
    boolean lead
    boolean secretary
    boolean coach
    string customTitle
  }

  PRIVATE_USER_INFO {
    string uid FK
    boolean completedAccountSetup
    boolean darkMode
    boolean useSystemDefault
    string[] expoPushTokens
    string resumeURL
    Timestamp expirationDate
  }

  COMMITTEE {
    string firebaseDocName PK
    string name
    string color
    string description
    string head
    string[] leads
    string[] representatives
    string applicationLink
    string logo
    number memberCount
    boolean isOpen
  }

  SHPE_EVENT {
    string id PK
    string name
    string description
    string eventType
    string[] tags
    Timestamp startTime
    Timestamp endTime
    number startTimeBuffer
    number endTimeBuffer
    string coverImageURI
    number signInPoints
    number signOutPoints
    number pointsPerHour
    string locationName
    GeoPoint geolocation
    number geofencingRadius
    string workshopType
    string committee FK
    string creator FK
    boolean general
    boolean nationalConventionEligible
    boolean notificationSent
    boolean hiddenEvent
  }

  SHPE_EVENT_LOG {
    string uid FK
    string eventId FK
    number points
    Timestamp signInTime
    Timestamp signOutTime
    Timestamp creationTime
    boolean verified
  }

  TEST {
    string subject
    string course
    string semester
    string year
    string testType
    string typeNumber
    string professor
    string student
    string grade
    string testURL
  }

  USER ||--|| ROLES : "has"
  USER ||--|| PRIVATE_USER_INFO : "has subcollection"
  USER }o--o{ COMMITTEE : "member of"
  COMMITTEE ||--o{ SHPE_EVENT : "hosts"
  USER ||--o{ SHPE_EVENT : "creates"
  SHPE_EVENT ||--o{ SHPE_EVENT_LOG : "has logs"
  USER ||--o{ SHPE_EVENT_LOG : "signs into"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
